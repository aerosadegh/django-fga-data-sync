# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_install:
      # them explicitly here to guarantee the documentation builds securely.
      - pip install mkdocs>=1.6.1 mike>=2.1.4 mkdocs-material>=9.7.6 mkdocstrings[python]>=1.0.3

python:
  install:
    # Install the django-fga-data-sync package itself into the RTD environment
    # so mkdocstrings can auto-generate documentation from your source code.
    - method: pip
      path: .

mkdocs:
  configuration: mkdocs.yml
